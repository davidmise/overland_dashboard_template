<!doctype html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 — Page Not Found · Overland Fleet Management</title>
  <link rel="icon" type="image/png" href="../image/PNG/Logo-03.png">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=switzer@100,300,400,500,700,900&display=swap">
  <link rel="stylesheet" href="../assets/css/overland-tokens.css">
  <link rel="stylesheet" href="../assets/css/overland-light.css">
  <link rel="stylesheet" href="../assets/css/overland-dark.css">
  <link rel="stylesheet" href="../assets/css/overland.css">
</head>
<body>

<div class="ol-error-page">
  <!-- Decorative brand graphic -->
  <div class="ol-error-page__graphic"></div>

  <!-- Logo -->
  <a href="../index.html" class="ol-layered ol-error-logo-link">
    <img src="../image/PNG/Logo-01.png"
         alt="Overland" class="ol-logo-h40">
  </a>

  <!-- 404 code -->
  <p class="ol-error-code ol-layered" aria-hidden="true">404</p>

  <!-- Title & message -->
  <h1 class="ol-error-title ol-layered">Route Not Found</h1>
  <p class="ol-error-message ol-layered">
    Looks like this route doesn't exist in our system. The page you were looking for may have been moved, deleted, or the URL may be incorrect.
  </p>

  <!-- Actions -->
  <div class="d-flex gap-3 justify-content-center flex-wrap ol-error-actions">
    <a href="../index.html" class="btn btn-primary btn-lg btn-icon">
      <i class="bi bi-speedometer2"></i> Back to Dashboard
    </a>
    <button onclick="history.back()" class="btn btn-outline-secondary btn-lg btn-icon">
      <i class="bi bi-arrow-left"></i> Go Back
    </button>
  </div>

  <!-- Quick links -->
  <div class="ol-error-quick-links">
    <p class="ol-error-quick-links-copy">
      Or try one of these:
    </p>
    <div class="d-flex gap-3 flex-wrap justify-content-center">
      <a href="table.html" class="btn btn-sm btn-outline-primary btn-icon">
        <i class="bi bi-box-seam"></i> Shipments
      </a>
      <a href="settings.html" class="btn btn-sm btn-outline-primary btn-icon">
        <i class="bi bi-gear"></i> Settings
      </a>
      <a href="login.html" class="btn btn-sm btn-outline-secondary btn-icon">
        <i class="bi bi-person"></i> Sign In
      </a>
    </div>
  </div>

  <!-- Footer -->
  <p class="ol-error-footer">
    &copy; 2026 Overland Logistics &mdash; All rights reserved
  </p>

  <!-- Theme toggle -->
  <div class="ol-error-theme-toggle">
    <button id="ol-theme-toggle" class="ol-topbar__icon-btn" aria-label="Toggle theme">
      <i class="bi bi-moon-fill"></i>
    </button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/overland.js"></script>

</body>
</html>
